<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Armed Bandit Diamond Mines Game</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); }
        }
        
        .pulse-glow {
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .float {
            animation: float 3s ease-in-out infinite;
        }

        .gradient-border {
            position: relative;
            background: linear-gradient(145deg, #1e3a8a, #1e40af, #3b82f6);
            padding: 2px;
            border-radius: 1rem;
        }
        
        .gradient-border-inner {
            background: #0f172a;
            border-radius: calc(1rem - 2px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .ai-thinking {
            animation: shimmer 2s infinite;
            background: linear-gradient(to right, transparent 0%, rgba(139, 92, 246, 0.3) 50%, transparent 100%);
            background-size: 1000px 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Star = ({ size = 24, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );

        const Bomb = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="13" r="9"></circle>
                <path d="M14.35 4.65 16.3 2.7a2.41 2.41 0 0 1 3.4 0l1.6 1.6a2.4 2.4 0 0 1 0 3.4l-1.95 1.95"></path>
            </svg>
        );

        const Brain = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path>
                <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path>
            </svg>
        );

        const Zap = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
        );

        const MinesBanditGame = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [showLogin, setShowLogin] = useState(true);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [signupName, setSignupName] = useState('');
            const [signupEmail, setSignupEmail] = useState('');
            const [signupPassword, setSignupPassword] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [authError, setAuthError] = useState('');

            const [gameState, setGameState] = useState('betting');
            const [betAmount, setBetAmount] = useState(25);
            const [balance, setBalance] = useState(250000);
            const [currentProfit, setCurrentProfit] = useState(0);
            const [nextMultiplier, setNextMultiplier] = useState(1.10);
            const [numMines, setNumMines] = useState(3);
            const [tiles, setTiles] = useState([]);
            const [revealedTiles, setRevealedTiles] = useState([]);
            const [gemsFound, setGemsFound] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const [aiThinking, setAiThinking] = useState(false);

            // Enhanced RL Features with Pattern Learning
            const [strategy, setStrategy] = useState('ucb');
            const [showHeatmap, setShowHeatmap] = useState(false);
            const [tileEstimates, setTileEstimates] = useState([]);
            const [tilePulls, setTilePulls] = useState([]);
            const [totalGames, setTotalGames] = useState(0);
            
            // Enhanced Statistics
            const [allTimeStats, setAllTimeStats] = useState({
                gamesPlayed: 0,
                gamesWon: 0,
                gamesLost: 0,
                totalWagered: 0,
                totalWon: 0,
                totalLost: 0,
                biggestWin: 0,
                currentStreak: 0,
                bestStreak: 0
            });

            // Pattern Learning Memory
            const [minePatterns, setMinePatterns] = useState([]);
            const [positionHistory, setPositionHistory] = useState(Array(25).fill({ safe: 0, mine: 0 }));

            const gridSize = 5;
            const totalTiles = gridSize * gridSize;
            const safeTiles = totalTiles - numMines;

            useEffect(() => {
                const savedUser = localStorage.getItem('minesUser');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    setCurrentUser(user);
                    setIsAuthenticated(true);
                    const savedBalance = localStorage.getItem(`balance_${user.email}`);
                    const savedStats = localStorage.getItem(`stats_${user.email}`);
                    const savedPatterns = localStorage.getItem(`patterns_${user.email}`);
                    
                    if (savedBalance) setBalance(parseFloat(savedBalance));
                    else {
                        setBalance(250000);
                        localStorage.setItem(`balance_${user.email}`, '250000');
                    }
                    
                    if (savedStats) setAllTimeStats(JSON.parse(savedStats));
                    if (savedPatterns) setMinePatterns(JSON.parse(savedPatterns));
                }
            }, []);

            useEffect(() => {
                if (currentUser) {
                    localStorage.setItem(`balance_${currentUser.email}`, balance.toString());
                    localStorage.setItem(`stats_${currentUser.email}`, JSON.stringify(allTimeStats));
                    localStorage.setItem(`patterns_${currentUser.email}`, JSON.stringify(minePatterns));
                }
            }, [balance, allTimeStats, minePatterns, currentUser]);

            useEffect(() => {
                if (isAuthenticated) {
                    initializeGame();
                }
            }, [numMines, isAuthenticated]);

            const initializeGame = () => {
                const newTiles = Array(totalTiles).fill(null).map((_, idx) => ({
                    id: idx,
                    isMine: false,
                    expectedValue: 0.5
                }));

                // Generate mine positions
                const mineIndices = new Set();
                while (mineIndices.size < numMines) {
                    mineIndices.add(Math.floor(Math.random() * totalTiles));
                }
                
                mineIndices.forEach(idx => {
                    newTiles[idx].isMine = true;
                });

                setTiles(newTiles);
                setTileEstimates(Array(totalTiles).fill(0.5));
                setTilePulls(Array(totalTiles).fill(0));
            };

            const calculateNextMultiplier = (gems) => {
                if (gems === 0) return 1.10;
                const base = 1.10;
                const factor = Math.pow(1 + (numMines / (totalTiles - gems)), gems);
                return Number((base * factor).toFixed(2));
            };

            // Enhanced Bandit Update with Pattern Learning
            const updateBanditEstimates = (tileId, isGem) => {
                const reward = isGem ? 1 : 0;
                const newPulls = [...tilePulls];
                newPulls[tileId]++;
                
                const newEstimates = [...tileEstimates];
                // Weighted update: recent performance matters more
                const learningRate = 0.1;
                newEstimates[tileId] = newEstimates[tileId] + learningRate * (reward - newEstimates[tileId]);
                
                setTileEstimates(newEstimates);
                setTilePulls(newPulls);

                // Update position history for pattern learning
                const newHistory = [...positionHistory];
                if (isGem) {
                    newHistory[tileId] = { ...newHistory[tileId], safe: newHistory[tileId].safe + 1 };
                } else {
                    newHistory[tileId] = { ...newHistory[tileId], mine: newHistory[tileId].mine + 1 };
                }
                setPositionHistory(newHistory);
            };

            // Enhanced UCB with Pattern Recognition
            const selectTileByStrategy = () => {
                const unrevealedIndices = tiles
                    .map((_, idx) => idx)
                    .filter(idx => !revealedTiles.includes(idx));

                if (unrevealedIndices.length === 0) return null;

                if (strategy === 'random') {
                    return unrevealedIndices[Math.floor(Math.random() * unrevealedIndices.length)];
                }

                if (strategy === 'greedy') {
                    let bestIdx = unrevealedIndices[0];
                    let bestEstimate = tileEstimates[bestIdx];
                    
                    unrevealedIndices.forEach(idx => {
                        if (tileEstimates[idx] > bestEstimate) {
                            bestEstimate = tileEstimates[idx];
                            bestIdx = idx;
                        }
                    });
                    
                    return bestIdx;
                }

                if (strategy === 'epsilon-greedy') {
                    if (Math.random() < 0.15) {
                        return unrevealedIndices[Math.floor(Math.random() * unrevealedIndices.length)];
                    }
                    let bestIdx = unrevealedIndices[0];
                    let bestEstimate = tileEstimates[bestIdx];
                    
                    unrevealedIndices.forEach(idx => {
                        if (tileEstimates[idx] > bestEstimate) {
                            bestEstimate = tileEstimates[idx];
                            bestIdx = idx;
                        }
                    });
                    
                    return bestIdx;
                }

                if (strategy === 'ucb') {
                    const totalPulls = tilePulls.reduce((a, b) => a + b, 0);
                    
                    // Force exploration of untried tiles first
                    const unexplored = unrevealedIndices.find(idx => tilePulls[idx] === 0);
                    if (unexplored !== undefined && totalGames > 0) return unexplored;
                    
                    let bestUcb = -Infinity;
                    let bestIdx = unrevealedIndices[0];
                    
                    unrevealedIndices.forEach(idx => {
                        // Combine Q-value estimate with historical pattern data
                        const qValue = tileEstimates[idx];
                        const pulls = Math.max(tilePulls[idx], 1);
                        
                        // UCB exploration bonus
                        const exploration = Math.sqrt((2 * Math.log(totalPulls + 1)) / pulls);
                        
                        // Pattern-based bonus (historical safety at this position)
                        const historyTotal = positionHistory[idx].safe + positionHistory[idx].mine;
                        const historyBonus = historyTotal > 0 
                            ? (positionHistory[idx].safe / historyTotal) * 0.3 
                            : 0;
                        
                        // Combined UCB score with pattern learning
                        const ucbValue = qValue + exploration * 0.4 + historyBonus;
                        
                        if (ucbValue > bestUcb) {
                            bestUcb = ucbValue;
                            bestIdx = idx;
                        }
                    });
                    
                    return bestIdx;
                }

                return unrevealedIndices[0];
            };

            const handleLogin = () => {
                setAuthError('');
                if (!loginEmail || !loginPassword) {
                    setAuthError('Please fill in all fields');
                    return;
                }
                const users = JSON.parse(localStorage.getItem('minesUsers') || '[]');
                const user = users.find(u => u.email === loginEmail && u.password === loginPassword);
                if (user) {
                    setCurrentUser({ name: user.name, email: user.email });
                    setIsAuthenticated(true);
                    localStorage.setItem('minesUser', JSON.stringify({ name: user.name, email: user.email }));
                    const userBalance = localStorage.getItem(`balance_${user.email}`);
                    const savedStats = localStorage.getItem(`stats_${user.email}`);
                    const savedPatterns = localStorage.getItem(`patterns_${user.email}`);
                    
                    if (userBalance) setBalance(parseFloat(userBalance));
                    else {
                        setBalance(250000);
                        localStorage.setItem(`balance_${user.email}`, '250000');
                    }
                    
                    if (savedStats) setAllTimeStats(JSON.parse(savedStats));
                    if (savedPatterns) setMinePatterns(JSON.parse(savedPatterns));
                } else {
                    setAuthError('Invalid email or password');
                }
            };

            const handleSignup = () => {
                setAuthError('');
                if (!signupName || !signupEmail || !signupPassword) {
                    setAuthError('Please fill in all fields');
                    return;
                }
                if (signupPassword.length < 6) {
                    setAuthError('Password must be at least 6 characters');
                    return;
                }
                const users = JSON.parse(localStorage.getItem('minesUsers') || '[]');
                if (users.find(u => u.email === signupEmail)) {
                    setAuthError('Email already registered');
                    return;
                }
                const newUser = { name: signupName, email: signupEmail, password: signupPassword };
                users.push(newUser);
                localStorage.setItem('minesUsers', JSON.stringify(users));
                setCurrentUser({ name: signupName, email: signupEmail });
                setIsAuthenticated(true);
                localStorage.setItem('minesUser', JSON.stringify({ name: signupName, email: signupEmail }));
                setBalance(250000);
                localStorage.setItem(`balance_${signupEmail}`, '250000');
            };

            const handleLogout = () => {
                if (currentUser) {
                    localStorage.setItem(`balance_${currentUser.email}`, balance.toString());
                    localStorage.setItem(`stats_${currentUser.email}`, JSON.stringify(allTimeStats));
                }
                localStorage.removeItem('minesUser');
                setIsAuthenticated(false);
                setCurrentUser(null);
                setLoginEmail('');
                setLoginPassword('');
                setSignupName('');
                setSignupEmail('');
                setSignupPassword('');
                setShowLogin(true);
                setBalance(250000);
            };

            const handlePlaceBet = () => {
                if (betAmount > balance || betAmount <= 0) return;
                setBalance(prev => prev - betAmount);
                setGameState('playing');
                setRevealedTiles([]);
                setGemsFound(0);
                setCurrentProfit(0);
                setNextMultiplier(1.10);
                setGameOver(false);
                setTotalGames(prev => prev + 1);
                
                // Update wagered amount
                setAllTimeStats(prev => ({
                    ...prev,
                    totalWagered: prev.totalWagered + betAmount
                }));
                
                initializeGame();
            };

            const handleTileClick = (tileId) => {
                if (gameState !== 'playing' || revealedTiles.includes(tileId) || gameOver) return;

                const tile = tiles[tileId];
                const newRevealed = [...revealedTiles, tileId];
                setRevealedTiles(newRevealed);

                updateBanditEstimates(tileId, !tile.isMine);

                if (tile.isMine) {
                    setGameOver(true);
                    
                    // Update loss statistics
                    setAllTimeStats(prev => ({
                        ...prev,
                        gamesPlayed: prev.gamesPlayed + 1,
                        gamesLost: prev.gamesLost + 1,
                        totalLost: prev.totalLost + betAmount,
                        currentStreak: 0
                    }));
                    
                    // Store mine pattern for learning
                    const minePositions = tiles.map((t, idx) => t.isMine ? idx : null).filter(idx => idx !== null);
                    setMinePatterns(prev => [...prev.slice(-100), minePositions]); // Keep last 100 patterns
                    
                    setTimeout(() => {
                        setRevealedTiles(minePositions);
                    }, 300);
                } else {
                    const newGemsFound = gemsFound + 1;
                    const currentMultiplier = calculateNextMultiplier(gemsFound);
                    const nextMult = calculateNextMultiplier(newGemsFound);
                    const newProfit = betAmount * currentMultiplier - betAmount;
                    
                    setGemsFound(newGemsFound);
                    setNextMultiplier(nextMult);
                    setCurrentProfit(newProfit);

                    if (newGemsFound === safeTiles) {
                        setTimeout(() => handleCashout(newProfit), 500);
                    }
                }
            };

            const handleAIPlay = () => {
                if (gameState !== 'playing' || gameOver || aiThinking) return;
                
                setAiThinking(true);
                
                // Simulate thinking time for realism
                setTimeout(() => {
                    const selectedTile = selectTileByStrategy();
                    if (selectedTile !== null) {
                        handleTileClick(selectedTile);
                    }
                    setAiThinking(false);
                }, 300);
            };

            const handleCashout = (profit = currentProfit) => {
                if (gameState !== 'playing' || gameOver) return;
                const payout = betAmount + profit;
                setBalance(prev => prev + payout);
                setGameState('cashed');
                
                // Update win statistics
                setAllTimeStats(prev => ({
                    ...prev,
                    gamesPlayed: prev.gamesPlayed + 1,
                    gamesWon: prev.gamesWon + 1,
                    totalWon: prev.totalWon + payout,
                    biggestWin: Math.max(prev.biggestWin, profit),
                    currentStreak: prev.currentStreak + 1,
                    bestStreak: Math.max(prev.bestStreak, prev.currentStreak + 1)
                }));
                
                setTimeout(() => setGameState('betting'), 2000);
            };

            const getHeatmapColor = (estimate, pulls) => {
                if (pulls === 0) return 'rgba(100, 116, 139, 0.3)';
                const confidence = Math.min(pulls / 5, 1);
                const green = Math.floor(estimate * 255);
                const red = Math.floor((1 - estimate) * 255);
                return `rgba(${red}, ${green}, 100, ${0.3 + confidence * 0.4})`;
            };

            // Calculate derived statistics
            const avgReward = allTimeStats.gamesPlayed > 0 
                ? (allTimeStats.totalWon - allTimeStats.totalWagered) / allTimeStats.gamesPlayed 
                : 0;
            const successRate = allTimeStats.gamesPlayed > 0 
                ? (allTimeStats.gamesWon / allTimeStats.gamesPlayed) * 100 
                : 0;
            const netProfit = allTimeStats.totalWon - allTimeStats.totalWagered;

            if (!isAuthenticated) {
                return (
                    <div className="w-full min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTTM2IDM0djItSDI0di0yaDE2em0wLTZ2Mkgy
NGgtMnYtMmgxNnptMC02djJIMjR2LTJoMTZ6Ii8+PC9nPjwvZz48L3N2Zz4=')] opacity-30"></div>
                        
                        <div className="w-full max-w-md relative z-10 float">
                            <div className="gradient-border">
                                <div className="gradient-border-inner p-8">
                                    <div className="text-center mb-8">
                                        <div className="text-6xl mb-4 float">💎</div>
                                        <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-400 to-purple-400 mb-2">Multi-Armed Bandit</h1>
                                        <h2 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 mb-2">Diamond Mines Game</h2>
                                        <p className="text-slate-400">AI-Powered RL Edition</p>
                                    </div>

                                    <div className="flex gap-2 mb-6 bg-slate-800/50 p-1 rounded-xl">
                                        <button onClick={() => setShowLogin(true)} className={`flex-1 py-3 rounded-lg font-semibold transition-all ${showLogin ? 'bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>Login</button>
                                        <button onClick={() => setShowLogin(false)} className={`flex-1 py-3 rounded-lg font-semibold transition-all ${!showLogin ? 'bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>Sign Up</button>
                                    </div>

                                    {authError && <div className="bg-red-500/10 border border-red-500/50 rounded-lg p-3 mb-4 text-red-400 text-sm text-center backdrop-blur">{authError}</div>}

                                    {showLogin ? (
                                        <div className="space-y-4">
                                            <input type="email" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()} placeholder="Email" className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                            <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()} placeholder="Password" className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                            <button onClick={handleLogin} className="w-full bg-gradient-to-r from-blue-600 via-cyan-600 to-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-blue-500/50 transition-all duration-300">Login</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <input type="text" value={signupName} onChange={(e) => setSignupName(e.target.value)} placeholder="Full Name" className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                            <input type="email" value={signupEmail} onChange={(e) => setSignupEmail(e.target.value)} placeholder="Email" className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                            <input type="password" value={signupPassword} onChange={(e) => setSignupPassword(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSignup()} placeholder="Password (min 6 chars)" className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                            <button onClick={handleSignup} className="w-full bg-gradient-to-r from-blue-600 via-cyan-600 to-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-blue-500/50 transition-all duration-300">Create Account</button>
                                        </div>
                                    )}

                                    <div className="mt-6 text-center text-slate-500 text-sm">
                                        <p>🧠 Advanced Pattern Recognition AI</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-4">
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTTM2IDM0djItSDI0di0yaDE2em0wLTZ2Mkgy
NGgtMnYtMmgxNnptMC02djJIMjR2LTJoMTZ6Ii8+PC9nPjwvZz48L3N2Zz4=')] opacity-30"></div>

                    <div className="max-w-7xl mx-auto relative z-10">
                        {/* Header */}
                        <div className="gradient-border mb-6">
                            <div className="gradient-border-inner p-6">
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center text-2xl">💎</div>
                                        <div>
                                            <h1 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400">MULTI-ARMED BANDIT DIAMOND MINES GAME</h1>
                                            <p className="text-slate-400 text-sm">Welcome, {currentUser?.name}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-right bg-gradient-to-br from-green-500/10 to-emerald-500/10 border border-green-500/20 rounded-xl px-6 py-3">
                                            <div className="text-slate-400 text-xs font-medium mb-1">BALANCE</div>
                                            <div className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-400">₹{balance.toFixed(2)}</div>
                                        </div>
                                        <button onClick={handleLogout} className="bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 px-6 py-3 rounded-xl font-semibold transition-all">Logout</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Enhanced Statistics */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 slide-in">
                            <div className="gradient-border">
                                <div className="gradient-border-inner p-4 text-center">
                                    <div className="text-slate-400 text-xs mb-1">Games Played</div>
                                    <div className="text-2xl font-bold text-white">{allTimeStats.gamesPlayed}</div>
                                    <div className="text-xs text-slate-500 mt-1">W: {allTimeStats.gamesWon} | L: {allTimeStats.gamesLost}</div>
                                </div>
                            </div>
                            <div className="gradient-border">
                                <div className="gradient-border-inner p-4 text-center">
                                    <div className="text-slate-400 text-xs mb-1">Avg Reward</div>
                                    <div className={`text-2xl font-bold ${avgReward >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                        ₹{avgReward.toFixed(2)}
                                    </div>
                                    <div className="text-xs text-slate-500 mt-1">Per Game</div>
                                </div>
                            </div>
                            <div className="gradient-border">
                                <div className="gradient-border-inner p-4 text-center">
                                    <div className="text-slate-400 text-xs mb-1">Total Winning</div>
                                    <div className={`text-2xl font-bold ${netProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                        {netProfit >= 0 ? '+' : ''}₹{netProfit.toFixed(2)}
                                    </div>
                                    <div className="text-xs text-slate-500 mt-1">Net Profit/Loss</div>
                                </div>
                            </div>
                            <div className="gradient-border">
                                <div className="gradient-border-inner p-4 text-center">
                                    <div className="text-slate-400 text-xs mb-1">Success Rate</div>
                                    <div className="text-2xl font-bold text-yellow-400">{successRate.toFixed(1)}%</div>
                                    <div className="text-xs text-slate-500 mt-1">Win Rate</div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Game Board */}
                            <div className="lg:col-span-2">
                                <div className="gradient-border">
                                    <div className="gradient-border-inner p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <div className="relative">
                                                <select value={numMines} onChange={(e) => gameState === 'betting' && setNumMines(parseInt(e.target.value))} disabled={gameState !== 'betting'} className="appearance-none bg-slate-800 border border-slate-700 text-white px-6 py-3 pr-12 rounded-xl font-semibold cursor-pointer hover:border-blue-500 transition-all disabled:opacity-50">
                                                    <option value={1}>💣 Mines: 1</option>
                                                    <option value={3}>💣 Mines: 3</option>
                                                    <option value={5}>💣 Mines: 5</option>
                                                    <option value={10}>💣 Mines: 10</option>
                                                </select>
                                                <div className="absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none text-slate-400">▼</div>
                                            </div>
                                            <div className="bg-gradient-to-r from-green-500 to-emerald-500 px-6 py-3 rounded-xl pulse-glow">
                                                <div className="text-white font-bold text-lg">Next: {nextMultiplier.toFixed(2)}x</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-5 gap-3 mb-6">
                                            {tiles.map((tile, idx) => {
                                                const isRevealed = revealedTiles.includes(idx);
                                                const isMine = tile.isMine && isRevealed;
                                                const isGem = !tile.isMine && isRevealed;
                                                const heatmapStyle = showHeatmap && !isRevealed ? {
                                                    background: getHeatmapColor(tileEstimates[idx], tilePulls[idx])
                                                } : {};
                                                
                                                return (
                                                    <button key={idx} onClick={() => handleTileClick(idx)} disabled={gameState !== 'playing' || isRevealed || gameOver || aiThinking} 
                                                        style={heatmapStyle}
                                                        className={`aspect-square rounded-2xl flex items-center justify-center transition-all duration-300 transform hover:scale-105 disabled:hover:scale-100 relative
                                                        ${!isRevealed 
                                                            ? 'bg-gradient-to-br from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 border-2 border-slate-600 hover:border-blue-500 shadow-lg' 
                                                            : isGem 
                                                                ? 'bg-gradient-to-br from-yellow-400 via-orange-500 to-pink-500 border-2 border-yellow-300 shadow-2xl shadow-yellow-500/50' 
                                                                : 'bg-gradient-to-br from-red-600 to-red-800 border-2 border-red-500'
                                                        }
                                                        ${aiThinking ? 'ai-thinking' : ''}`}>
                                                        {isGem && <Star size={48} fill="white" className="drop-shadow-lg" />}
                                                        {isMine && <Bomb size={40} className="text-white" />}
                                                        {!isRevealed && !showHeatmap && <div className="w-12 h-12 bg-slate-600/40 rounded-full"></div>}
                                                        {showHeatmap && !isRevealed && (
                                                            <div className="text-center">
                                                                <div className="text-xs text-white font-bold">{(tileEstimates[idx] * 100).toFixed(0)}%</div>
                                                                <div className="text-[10px] text-slate-300">n={tilePulls[idx]}</div>
                                                            </div>
                                                        )}
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        {gameState === 'playing' && gemsFound > 0 && (
                                            <div className="bg-gradient-to-r from-green-500/10 to-emerald-500/10 border border-green-500/20 rounded-xl p-4">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-white font-semibold">Gems Found: {gemsFound}/{safeTiles}</span>
                                                    <div className="text-right">
                                                        <div className="text-green-400 text-2xl font-bold">₹{currentProfit.toFixed(2)}</div>
                                                        <div className="text-slate-400 text-sm">Current Profit</div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {gameOver && (
                                            <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center slide-in">
                                                <div className="text-3xl mb-2">💥</div>
                                                <div className="text-red-400 font-bold text-lg mb-1">Hit a Mine!</div>
                                                <div className="text-slate-400 text-sm">Strategy: {strategy.toUpperCase()}</div>
                                            </div>
                                        )}

                                        {gameState === 'cashed' && (
                                            <div className="bg-green-500/10 border border-green-500/30 rounded-xl p-4 text-center slide-in">
                                                <div className="text-3xl mb-2">🎉</div>
                                                <div className="text-green-400 font-bold text-lg mb-1">Cashed Out!</div>
                                                <div className="text-slate-400 text-sm">You won ₹{currentProfit.toFixed(2)}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="space-y-4">
                                {/* RL Strategy Selector */}
                                {gameState === 'playing' && (
                                    <div className="gradient-border slide-in">
                                        <div className="gradient-border-inner p-4">
                                            <div className="flex items-center gap-2 mb-3">
                                                <Brain size={20} className="text-purple-400" />
                                                <span className="text-white font-semibold">RL Strategy</span>
                                            </div>
                                            <select value={strategy} onChange={(e) => setStrategy(e.target.value)} className="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl mb-3 cursor-pointer hover:border-purple-500 transition-all">
                                                <option value="ucb">🧠 UCB + Pattern Learning</option>
                                                <option value="epsilon-greedy">⚡ ε-Greedy</option>
                                                <option value="greedy">🎯 Greedy</option>
                                                <option value="random">🎲 Random</option>
                                            </select>
                                            <div className="flex gap-2">
                                                <button onClick={handleAIPlay} disabled={gameOver || aiThinking} className={`flex-1 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white py-3 rounded-xl font-bold transition-all disabled:opacity-50 flex items-center justify-center gap-2 ${aiThinking ? 'ai-thinking' : ''}`}>
                                                    <Zap size={18} />
                                                    {aiThinking ? 'Thinking...' : 'AI Pick'}
                                                </button>
                                                <button onClick={() => setShowHeatmap(!showHeatmap)} className={`px-4 py-3 rounded-xl font-bold transition-all ${showHeatmap ? 'bg-yellow-500 text-black' : 'bg-slate-800 text-white border border-slate-700'}`}>
                                                    {showHeatmap ? '🔥' : '📊'}
                                                </button>
                                            </div>
                                            <div className="mt-3 text-xs text-slate-400">
                                                {strategy === 'ucb' && '• Uses pattern recognition from past games'}
                                                {strategy === 'epsilon-greedy' && '• Explores 15% of time, exploits 85%'}
                                                {strategy === 'greedy' && '• Always picks highest estimate'}
                                                {strategy === 'random' && '• Pure random selection (baseline)'}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Bet Controls */}
                                <div className="gradient-border">
                                    <div className="gradient-border-inner p-6">
                                        <div className="text-slate-400 text-sm font-medium mb-3">BET AMOUNT</div>
                                        <div className="flex gap-2 mb-4">
                                            <button onClick={() => setBetAmount(p => Math.max(1, p - 10))} disabled={gameState === 'playing'} className="w-12 h-12 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-xl font-bold text-xl transition-all disabled:opacity-50">−</button>
                                            <input type="number" value={betAmount} onChange={(e) => setBetAmount(Math.max(1, parseInt(e.target.value) || 1))} disabled={gameState === 'playing'} className="flex-1 bg-slate-800 border border-slate-700 text-white text-center text-xl font-bold py-2 rounded-xl focus:border-blue-500 focus:outline-none disabled:opacity-50" />
                                            <button onClick={() => setBetAmount(p => p + 10)} disabled={gameState === 'playing'} className="w-12 h-12 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-xl font-bold text-xl transition-all disabled:opacity-50">+</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => setBetAmount(p => Math.max(1, Math.floor(p / 2)))} disabled={gameState === 'playing'} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white py-2 rounded-lg font-semibold transition-all disabled:opacity-50">½</button>
                                            <button onClick={() => setBetAmount(p => p * 2)} disabled={gameState === 'playing'} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white py-2 rounded-lg font-semibold transition-all disabled:opacity-50">2×</button>
                                        </div>
                                    </div>
                                </div>

                                {gameState === 'betting' ? (
                                    <button onClick={handlePlaceBet} disabled={betAmount > balance} className="w-full bg-gradient-to-r from-green-500 via-emerald-500 to-green-500 text-white py-5 rounded-xl font-bold text-xl shadow-lg hover:shadow-green-500/50 transition-all duration-300 disabled:opacity-50">
                                        PLACE BET
                                    </button>
                                ) : gameState === 'playing' && !gameOver ? (
                                    <button onClick={() => handleCashout()} className="w-full bg-gradient-to-r from-yellow-500 via-orange-500 to-yellow-500 text-white py-5 rounded-xl font-bold text-xl shadow-lg hover:shadow-orange-500/50 transition-all duration-300">
                                        CASHOUT ₹{(betAmount + currentProfit).toFixed(2)}
                                    </button>
                                ) : (
                                    <button onClick={() => setGameState('betting')} className="w-full bg-gradient-to-r from-blue-500 via-cyan-500 to-blue-500 text-white py-5 rounded-xl font-bold text-xl shadow-lg hover:shadow-blue-500/50 transition-all duration-300">
                                        NEW GAME
                                    </button>
                                )}

                                {/* Extended Stats */}
                                <div className="gradient-border">
                                    <div className="gradient-border-inner p-4">
                                        <div className="text-slate-400 text-sm mb-3 font-semibold">📊 Performance Metrics</div>
                                        <div className="space-y-2 text-xs">
                                            <div className="flex justify-between">
                                                <span className="text-slate-500">Biggest Win:</span>
                                                <span className="text-green-400 font-bold">₹{allTimeStats.biggestWin.toFixed(2)}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-500">Current Streak:</span>
                                                <span className="text-cyan-400 font-bold">{allTimeStats.currentStreak}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-500">Best Streak:</span>
                                                <span className="text-yellow-400 font-bold">{allTimeStats.bestStreak}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-500">Total Wagered:</span>
                                                <span className="text-slate-300">₹{allTimeStats.totalWagered.toFixed(2)}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-500">Patterns Learned:</span>
                                                <span className="text-purple-400 font-bold">{minePatterns.length}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MinesBanditGame />);
    </script>
</body>
</html>
